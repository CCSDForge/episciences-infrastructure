services:
  epi-citations-httpd:
    image: httpd:2.4-trixie
    container_name: epi-citations-httpd
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    restart: always
    volumes:
      - ./docker/apache/vhost.conf:/usr/local/apache2/conf/extra/episciences-citations.conf
      - ./docker/apache/ssl:/usr/local/apache2/conf/ssl
      - .:/var/www/htdocs
      - ./data:/var/www/data
      - ./cache:/var/www/cache
      - ./logs:/var/www/logs
    depends_on:
      - epi-citations-php-fpm
    networks:
      - epi-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.citations.rule=Host(`citations-dev.episciences.org`)"
      - "traefik.http.routers.citations.entrypoints=web"
      - "traefik.http.routers.citations-secure.rule=Host(`citations-dev.episciences.org`)"
      - "traefik.http.routers.citations-secure.entrypoints=websecure"
      - "traefik.http.routers.citations-secure.tls=true"
      - "traefik.http.services.citations.loadbalancer.server.port=80"
    command: >
      /bin/sh -c "chown -R www-data:www-data /var/www/data /var/www/cache /var/www/logs && httpd-foreground"


  epi-citations-php-fpm:
    container_name: epi-citations-php-fpm
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    ports:
      - "9004:9004" # Xdebug
    restart: always
    volumes:
      - .:/var/www/htdocs
      - ./data:/var/www/data
      - ./cache:/var/www/cache
      - ./logs:/var/www/logs
      - ./docker/php-fpm/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-custom.conf
      - ./logs/xdebug.log:/var/www/logs
    env_file:
      - .env.local
    environment:
      - PHP_FPM_LISTEN_PORT=9000
      - XDEBUG_MODE=debug
      - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9005
      - APP_ENV=dev
      - APP_DEBUG=1
    expose:
      - "9000"  # Expose internal port 9000
    extra_hosts:
      - "dev.episciences.org:host-gateway"
      - "manager-dev.episciences.org:host-gateway"
      - "oai-dev.episciences.org:host-gateway"
      - "data-dev.episciences.org:host-gateway"
      - "dev-new.episciences.org:host-gateway"
      - "api-dev.episciences.org:host-gateway"
    networks:
      - epi-network

networks:
  epi-network:
    external: true


